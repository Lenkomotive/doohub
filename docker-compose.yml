services:
  web:
    build: ./web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DOOHUB_DATABASE_URL=postgresql://doohub:doohub@db:5432/doohub
      - DOOHUB_SECRET_KEY=change-me-in-production
      - DOOHUB_PROVIDER_URL=http://dooslave-mustafa:8001
      - DOOHUB_PROVIDER_API_KEY=change-me
    networks:
      - default
      - doohub-net

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=doohub
      - POSTGRES_PASSWORD=doohub
      - POSTGRES_DB=doohub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doohub"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  doohub-net:
    external: true

volumes:
  pgdata:
