services:
  backend:
    container_name: doohub-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "${DOOHUB_PORT:-9000}:8000"
    depends_on:
      db:
        condition: service_healthy
      slave:
        condition: service_started
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/firebase-service-account.json
    volumes:
      - /opt/secrets/firebase-service-account.json:/secrets/firebase-service-account.json:ro
    restart: unless-stopped
    networks:
      - default
      - doohub-net

  slave:
    container_name: doohub-slave
    build:
      context: ./slave
    env_file: .env.slave
    restart: unless-stopped
    volumes:
      - slave-projects:/projects
      - slave-claude:/home/claude/.claude
      - /opt/shared/doohub-ops-key:/home/claude/.ssh/doohub-ops-key:ro
    networks:
      - doohub-net

  db:
    container_name: doohub-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=doohub
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-doohub}
      - POSTGRES_DB=doohub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doohub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default
      - doohub-net

networks:
  doohub-net:
    external: true

volumes:
  pgdata:
  slave-projects:
  slave-claude:
