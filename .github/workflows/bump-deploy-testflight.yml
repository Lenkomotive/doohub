name: Bump & Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  bump:
    name: Bump build number
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump build number
        run: |
          cd app
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          NEXT=$((CURRENT + 1))
          sed -i "s/+${CURRENT}/+${NEXT}/" pubspec.yaml
          echo "Build number: $CURRENT → $NEXT"

      - name: Commit build number bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/pubspec.yaml
          git commit -m "Bump build number to $(grep '^version:' app/pubspec.yaml | sed 's/.*+//')"
          git push

  deploy:
    name: Deploy
    needs: bump
    uses: ./.github/workflows/deploy-testflight.yml
    secrets: inherit
